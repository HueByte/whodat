name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master, dev]
  workflow_dispatch:

jobs:
  rust:
    name: Rust (cli)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/cli
    steps:
      - uses: actions/checkout@v4

      - name: Detect cli changes
        id: changes
        working-directory: ${{ github.workspace }}
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            git fetch origin "$BASE_REF" --depth=1
            CHANGED=$(git diff --name-only "origin/$BASE_REF"...HEAD -- 'src/cli/' '.github/workflows/ci.yml' | wc -l)
          elif [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=1
          else
            CHANGED=$(git diff --name-only "$BEFORE" HEAD -- 'src/cli/' '.github/workflows/ci.yml' | wc -l)
          fi
          [ "$CHANGED" -gt 0 ] && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        if: steps.changes.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        if: steps.changes.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/cli/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src/cli/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: cargo fmt
        if: steps.changes.outputs.changed == 'true'
        run: cargo fmt --check

      - name: cargo clippy
        if: steps.changes.outputs.changed == 'true'
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo build
        if: steps.changes.outputs.changed == 'true'
        run: cargo build --release

      - name: cargo test
        if: steps.changes.outputs.changed == 'true'
        run: cargo test --release

      - name: Skip notice
        if: steps.changes.outputs.changed == 'false'
        run: echo "No cli changes — skipping Rust build/test."

  dotnet:
    name: .NET (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect api changes
        id: changes
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            git fetch origin "$BASE_REF" --depth=1
            CHANGED=$(git diff --name-only "origin/$BASE_REF"...HEAD -- 'src/api/' '.github/workflows/ci.yml' | wc -l)
          elif [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=1
          else
            CHANGED=$(git diff --name-only "$BEFORE" HEAD -- 'src/api/' '.github/workflows/ci.yml' | wc -l)
          fi
          [ "$CHANGED" -gt 0 ] && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"

      - name: Setup .NET 10
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        if: steps.changes.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/api/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Format check
        if: steps.changes.outputs.changed == 'true'
        run: dotnet format src/api/Whodat.slnx --verify-no-changes --verbosity diagnostic

      - name: Build
        if: steps.changes.outputs.changed == 'true'
        run: dotnet build src/api/Whodat.slnx --configuration Release

      - name: Test
        if: steps.changes.outputs.changed == 'true'
        run: dotnet test src/api/Whodat.slnx --no-build --configuration Release --verbosity normal

      - name: Skip notice
        if: steps.changes.outputs.changed == 'false'
        run: echo "No api changes — skipping .NET build/test."

  lint-markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            README.md
            packaging/**/*.md
            .github/**/*.md
