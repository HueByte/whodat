upstream whodat_api {
    server api:8080;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Sensible defaults
    sendfile on;
    server_tokens off;
    client_max_body_size 256k;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # Health probe for the proxy itself
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }

    # Proxy everything under /api/ straight through. The API mounts its
    # endpoints under /api itself (route group), so no rewriting is needed.
    location /api/ {
        proxy_pass         http://whodat_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Static webapp slot — drop a build into ./infra/nginx/html or mount a
    # `web` service over /usr/share/nginx/html later.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
