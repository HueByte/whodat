name: Docker

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/huebyte/whodat-api

jobs:
  docker:
    name: Build & Push API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect api/infra changes
        id: changes
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            git fetch origin "$BASE_REF" --depth=1
            CHANGED=$(git diff --name-only "origin/$BASE_REF"...HEAD -- 'src/api/' 'src/cli/Cargo.toml' '.github/workflows/docker.yml' | wc -l)
          elif [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=1
          else
            CHANGED=$(git diff --name-only "$BEFORE" HEAD -- 'src/api/' 'src/cli/Cargo.toml' '.github/workflows/docker.yml' | wc -l)
          fi
          [ "$CHANGED" -gt 0 ] && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"

      - name: Read version
        if: steps.changes.outputs.changed == 'true'
        id: version
        run: |
          VERSION=$(grep -oP '(?<=^version = ")[^"]+' src/cli/Cargo.toml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if image tag exists
        if: steps.changes.outputs.changed == 'true'
        id: check_image
        env:
          EVENT: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # On a PR we can't push anyway, so the existence check is irrelevant —
          # we always want to validate that the image still builds.
          if [ "$EVENT" = "pull_request" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG="${{ steps.version.outputs.tag }}"
          if docker manifest inspect "${{ env.IMAGE }}:${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.changes.outputs.changed == 'true' && steps.check_image.outputs.exists == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.changes.outputs.changed == 'true' && steps.check_image.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.changes.outputs.changed == 'true' && steps.check_image.outputs.exists == 'false' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on master)
        if: steps.changes.outputs.changed == 'true' && steps.check_image.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          file: ./src/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.version.outputs.tag }}
          labels: |
            org.opencontainers.image.title=whodat API
            org.opencontainers.image.description=Registry API for whodat — a global, public registry of identities
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Skip notice
        if: steps.changes.outputs.changed != 'true' || steps.check_image.outputs.exists == 'true'
        run: echo "Skipped — no api/infra changes or image tag already exists."
