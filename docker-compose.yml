services:
  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    image: whodat-api:latest
    container_name: whodat-api
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Whodat__DbPath: /data/whodat.db
      GitHub__ClientId: ${GITHUB_CLIENT_ID:-}
    volumes:
      - whodat-data:/data
      - whodat-logs:/app/logs
    networks:
      - whodat
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: whodat-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WHODAT_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/html:/usr/share/nginx/html:ro
    networks:
      - whodat
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  whodat:

volumes:
  whodat-data:
  whodat-logs:
